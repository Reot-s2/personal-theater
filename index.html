<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>퍼스널 시어터</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo">🎬 퍼스널 시어터</span>
      </div>
      <div class="topbar-right">
        <a class="ticket-nav-link" href="ticket.html">🎟 티켓 만들기</a>
        <span class="live-badge">LIVE</span>
        <span class="viewer-count" id="viewerCount">1명 시청 중</span>
      </div>
    </header>

    <main class="theater-layout">
      <section class="screen-section">
        <div class="screen-wrapper" id="screenWrapper">
          <div class="screen-placeholder" id="screenPlaceholder">
            <p class="placeholder-icon">🖥️</p>
            <p>화면 공유 대기 중...</p>
            <label class="share-quality-row">
              <span>화질</span>
              <select id="shareQualitySelect">
                <option value="standard">표준 (1080p, 30fps)</option>
                <option value="high">고화질 (1080p, 60fps)</option>
              </select>
            </label>
            <button type="button" class="share-start-btn" id="shareStartBtn">화면 공유 시작</button>
          </div>
          <video class="screen-video" id="screenVideo" autoplay playsinline muted></video>
          <button type="button" class="share-stop-btn" id="shareStopBtn">⏹ 공유 중지</button>
          <button type="button" class="unmute-btn" id="unmuteBtn" hidden>🔇 소리 켜기</button>
          <div class="screen-volume-control" id="screenVolumeControl" hidden>
            <svg class="volume-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 9v6h4l5 5V4L8 9H4z"></path>
              <path
                d="M14 4.05v2.06c2.89.86 5 3.54 5 6.89s-2.11 6.03-5 6.89v2.06c4.01-.91 7-4.49 7-8.95s-2.99-8.04-7-8.95z"
              ></path>
            </svg>
            <input type="range" id="screenVolumeSlider" min="0" max="1" step="0.05" value="1" title="소리 크기" />
          </div>
          <!-- 리액션 애니메이션이 재생되는 오버레이 -->
          <div class="reaction-stage" id="reactionStage" aria-hidden="true"></div>
        </div>
      </section>

      <div class="chat-resize-handle" id="chatResizeHandle"></div>

      <aside class="chat-panel">
        <div class="chat-header">
          <span>실시간 채팅</span>
          <div class="chat-header-actions">
            <button class="icon-btn" id="backupTrigger" type="button" title="채팅 로그 백업">💾</button>
            <button class="profile-trigger" id="profileTrigger" type="button">
              <span class="msg-avatar" id="myAvatarPreview"></span>
              <span class="profile-name" id="myNamePreview"></span>
            </button>
          </div>
        </div>

        <div class="backup-menu" id="backupMenu" hidden>
          <button type="button" id="backupTxtBtn">텍스트로 저장 (.txt)</button>
          <button type="button" id="backupHtmlBtn">HTML로 저장 (.html)</button>
        </div>

        <div class="profile-menu" id="profileMenu" hidden>
          <div class="profile-menu-row">
            <label for="nameInput">닉네임</label>
            <input type="text" id="nameInput" maxlength="12" placeholder="닉네임 입력" autocomplete="off" />
          </div>
          <div class="profile-menu-row">
            <label for="colorInput">닉네임 색상</label>
            <input type="color" id="colorInput" />
          </div>
          <div class="profile-menu-row">
            <label>프로필 사진</label>
            <div class="avatar-upload-row">
              <span class="msg-avatar avatar-preview-lg" id="avatarPreviewLg"></span>
              <label class="avatar-upload-btn" for="avatarUpload">이미지 업로드</label>
              <input type="file" id="avatarUpload" accept="image/*" hidden />
              <button type="button" class="avatar-remove-btn" id="avatarRemoveBtn">제거</button>
            </div>
          </div>
          <div class="profile-menu-actions">
            <button type="button" id="profileCloseBtn">완료</button>
          </div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="reaction-bar">
          <button class="reaction-btn" data-type="boo" id="btnBoo" type="button">
            <span class="reaction-icon">
              <svg viewBox="0 0 24 24" style="width: 1em; height: 1em; display: block" aria-hidden="true">
                <ellipse cx="12" cy="13.5" rx="9.5" ry="8" fill="#e6432f"></ellipse>
                <ellipse cx="8.3" cy="9.8" rx="2.6" ry="1.6" fill="#ff8a72" opacity="0.65"></ellipse>
                <polygon
                  points="12,3 13.8,7.2 18.3,7.2 14.7,9.8 16,14 12,11.3 8,14 9.3,9.8 5.7,7.2 10.2,7.2"
                  fill="#3fa34d"
                ></polygon>
              </svg>
            </span>
            <span class="reaction-label">야유</span>
          </button>
          <button class="reaction-btn" data-type="clap" id="btnClap" type="button">
            <span class="reaction-icon">🎉</span>
            <span class="reaction-label">박수</span>
          </button>
          <button class="reaction-btn" data-type="heart" id="btnHeart" type="button">
            <span class="reaction-icon">❤️</span>
            <span class="reaction-label">하트</span>
          </button>
          <button class="reaction-btn" id="emojiPanelBtn" type="button" title="이모티콘">
            <span class="reaction-icon">😊</span>
          </button>
          <div class="emoji-panel" id="emojiPanel" hidden>
            <!-- 여기에 이모티콘 버튼들을 일렬로 추가하면 됨 -->
          </div>
        </div>

        <div class="chat-attachment-preview" id="chatAttachmentPreview" hidden>
          <img id="chatAttachmentImg" alt="" />
          <button type="button" id="chatAttachmentRemoveBtn" title="첨부 취소">✕</button>
        </div>

        <form class="chat-input-area" id="chatForm">
          <button type="button" class="chat-attach-btn" id="chatAttachBtn" title="이미지 첨부">📎</button>
          <input type="file" id="chatImageInput" accept="image/*" hidden />
          <textarea
            id="chatInput"
            placeholder="메시지를 입력하세요."
            autocomplete="off"
            maxlength="200"
            rows="1"
          ></textarea>
          <button type="submit" id="chatSendBtn">전송</button>
        </form>
      </aside>
    </main>
  </div>

  <div class="avatar-crop-overlay" id="avatarCropOverlay" hidden>
    <div class="avatar-crop-modal">
      <h3>프로필 사진 위치 조정</h3>
      <div class="avatar-crop-viewport" id="avatarCropViewport">
        <img id="avatarCropImage" alt="" draggable="false" />
      </div>
      <input type="range" id="avatarCropZoom" min="1" max="3" step="0.01" value="1" />
      <div class="avatar-crop-actions">
        <button type="button" id="avatarCropCancelBtn">취소</button>
        <button type="button" id="avatarCropApplyBtn">적용</button>
      </div>
    </div>
  </div>

  <div class="image-lightbox" id="imageLightbox" hidden>
    <img id="imageLightboxImg" alt="" />
  </div>

  <script src="script.js"></script>
</body>
</html>
